name: Build and Release Scheduler

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: pyinstaller --noconfirm --clean app.spec

      - name: Package Windows (zip folder onedir)
        run: Compress-Archive -Path dist/app/* -DestinationPath scheduler-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-windows
          path: scheduler-windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller --noconfirm --clean app.spec

      - name: Package macOS (.app bundle)
        run: |
          cd dist
          zip -r -y ../scheduler-macos.zip "Jadwal Farmasi.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-macos
          path: scheduler-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: scheduler-windows
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: scheduler-macos
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
